# .gitea/workflows/ci.yml — windfall-labs CI (monorepo: Next frontend + FastAPI backend)
# Canonical adr-020, dual-stack variant. Hard gates verified green on host 2026-07-06:
#   frontend `tsc --noEmit` + `next build`; backend `compileall` syntax smoke.
# Lint (frontend eslint / backend ruff) is a WARNING per adr-020 (style must not red
# CI for a solo/no-public-users project). pytest is gated behind RUN_TESTS.
name: ci
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  frontend-quality:             # always hard — fast gates (adr-020)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint --if-present || echo "lint warnings (non-blocking)"
      - run: npm run build

  backend-quality:              # always hard — Python syntax smoke; ruff = warning
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python -m compileall -q app windfall strategies grids scripts
      - run: pip install -q ruff && ruff check . || echo "ruff warnings (non-blocking)"

  backend-tests:                # gated behind RUN_TESTS (needs full deps + DB fixtures)
    if: ${{ vars.RUN_TESTS == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: python -m pytest -q
