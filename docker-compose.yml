services:
  api:
    build: ./backend
    container_name: windfall-api
    restart: unless-stopped
    ports:
      - "8505:8503"   # host 8505 (8503 is taken by another project) -> container 8503
    volumes:
      - ./backend/data:/app/data
      - ./backend/strategies:/app/strategies
    environment:
      - WINDFALL_DATA_DIR=/app/data
      - WINDFALL_DB=/app/data/windfall.duckdb
    command: uvicorn app.main:app --host 0.0.0.0 --port 8503

  web:
    build: ./frontend
    container_name: windfall-web
    restart: unless-stopped
    ports:
      - "8500:8500"
    environment:
      # Single-origin: browser calls /api/* on this host; Next rewrites to the api container
      # (see frontend/next.config.mjs). Works on LAN and through the tunnel; no hardcoded LAN IP.
      - API_INTERNAL_BASE=http://api:8503
    depends_on:
      - api
