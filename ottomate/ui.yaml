pages:
  - id: page-windfall-home
    title: Cockpit Home
    route: /
    purpose: "Overview: saved strategies, quick stats, recent backtests and data
      status."
    layout_type: dashboard
    empty_state: No strategies yet - create your first strategy to run a backtest.
    loading_state: skeleton
    permissions: anonymous
    mobile_handling: desktop-only
    entry_points: []
    components: []
  - id: page-windfall-strategy-editor
    title: Strategy Editor
    route: /strategies/[id]
    purpose: Create, edit and save a declarative strategy config and launch a backtest.
    layout_type: form
    empty_state: Start from a template or a blank config.
    loading_state: spinner
    permissions: anonymous
    mobile_handling: desktop-only
    entry_points: []
    components: []
  - id: page-windfall-backtest-results
    title: Backtest Results
    route: /strategies/[id] (inline)
    purpose: Backtest results (equity/drawdown curves, summary metrics, monthly
      returns, full trade log) render INLINE on the strategy page via
      components/BacktestReport.tsx. There is no standalone /backtests/[id]
      route.
    layout_type: detail
    empty_state: Run a backtest to see results here.
    loading_state: skeleton
    permissions: anonymous
    mobile_handling: desktop-only
    entry_points: []
    components: []
  - id: page-windfall-walk-forward
    title: Walk-Forward Report
    route: (API only)
    purpose: Walk-forward (in-sample vs out-of-sample) + parameter sweep exist as
      backend APIs (POST /api/walkforward, /api/sweep). No dedicated UI route is
      built yet.
    layout_type: detail
    empty_state: Launch a walk-forward to see the robustness report.
    loading_state: skeleton
    permissions: anonymous
    mobile_handling: desktop-only
    entry_points: []
    components: []
  - id: page-windfall-signals
    title: Live Signals
    route: /signals
    purpose: Today's buy/hold/sell list with entry/stop/target/size, exportable.
    layout_type: list
    empty_state: No signals yet - run a saved strategy on the latest data.
    loading_state: skeleton
    permissions: anonymous
    mobile_handling: desktop-only
    entry_points: []
    components: []
  - id: page-windfall-paper
    title: Paper Trades
    route: (API only)
    purpose: Paper-trade scoreboard + open simulated positions exist as backend APIs
      (/api/paper/*). No dedicated UI route is built yet.
    layout_type: dashboard
    empty_state: No paper trades yet - commit a live signal to start tracking.
    loading_state: skeleton
    permissions: anonymous
    mobile_handling: desktop-only
    entry_points: []
    components: []
  - id: page-windfall-data
    title: Data Status
    route: (API only)
    purpose: Universe coverage / last-update / ADTV / data-feasibility available via
      API (/api/data, /api/coverage); surfaced on the Cockpit. No dedicated
      /data route.
    layout_type: dashboard
    empty_state: No data loaded yet.
    loading_state: skeleton
    permissions: anonymous
    mobile_handling: desktop-only
    entry_points: []
    components: []
  - id: page-windfall-reference
    title: Reference
    route: /reference
    purpose: Reference/catalog page (frontend/src/app/reference) — strategy-config
      field reference and factor catalog. A real nav destination (Cockpit /
      Strategies / Signals / Reference) that was missing from the tracker.
    layout_type: list
    permissions: anonymous
    mobile_handling: responsive
    entry_points: []
    components: []
  - id: page-windfall-leaderboards
    title: Leaderboards
    route: /leaderboards
    purpose: "Multi-board strategy leaderboards: overall 10y sweep, post-COVID 5y
      study, pre-COVID out-of-window, family medians, robustness verdicts"
    layout_type: dashboard
    empty_state: No study dataset found - run the leaderboard curation script
    loading_state: skeleton
    error_state: inline error with retry
    permissions: anonymous
    mobile_handling: responsive
    entry_points: []
    components: []
